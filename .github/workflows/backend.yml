name: Backend CI

on: 
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
        

      - name: Install dependencies
        working-directory: backend
        run: go mod tidy

      - name: Build
        working-directory: backend
        run: go build ./...
      
      - name: Vet
        working-directory: backend
        run: go vet ./...
      
      - name: Test
        working-directory: backend
        run: go test -count=1 ./...